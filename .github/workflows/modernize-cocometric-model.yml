name: Validate Cocometric GLB regeneration

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regenerate-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Regenerate modern GLB from the preserved source
        run: node scripts/modernize-cocometric-model-v2.mjs

      - name: Validate model structure
        run: npm run validate:cocometric

      - name: Validate production build
        run: npm run build

      - name: Upload regenerated models for inspection
        uses: actions/upload-artifact@v4
        with:
          name: cocometric-regenerated-model
          retention-days: 14
          path: |
            src/data/cocometric-model/manifest.json
            public/models/cocometric-original-2026-07-12.glb
            public/models/cocometric-modern.glb
