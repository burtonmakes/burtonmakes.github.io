name: Modernize Cocometric GLB

on:
  workflow_dispatch:
  push:
    branches:
      - cocometric-modern-materials
    paths:
      - scripts/modernize-cocometric-model-v2.mjs
      - .github/workflows/modernize-cocometric-model.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/modernize-cocometric-model-v2.mjs
      - .github/workflows/modernize-cocometric-model.yml

permissions:
  contents: read

concurrency:
  group: modernize-cocometric-model-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: false

jobs:
  modernize:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Preserve and modernize GLB
        id: modernize
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/modernize-cocometric-model-v2.mjs 2>&1 | tee modernize-cocometric-model.log

      - name: Validate model structure
        if: steps.modernize.outcome == 'success'
        run: npm run validate:cocometric

      - name: Validate production build
        if: steps.modernize.outcome == 'success'
        run: npm run build

      - name: Upload generated GLB, backup, and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cocometric-modern-model-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            modernize-cocometric-model.log
            src/data/cocometric-model/part-0.js
            src/data/cocometric-model/part-1.js
            src/data/cocometric-model/part-2.js
            src/data/cocometric-model/part-3.js
            src/data/cocometric-model/part-4.js
            src/data/cocometric-model/part-5.js
            src/data/cocometric-model/manifest.json
            src/data/cocometric-model-backup/original-2026-07-12
            public/models/cocometric-original-2026-07-12.glb
            public/models/cocometric-modern.glb

      - name: Fail if model generation failed
        if: steps.modernize.outcome == 'failure'
        run: exit 1
