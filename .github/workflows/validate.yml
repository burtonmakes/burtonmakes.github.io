name: Validate pull requests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify repository hygiene
        run: |
          stale_paths=(
            public/models
            src/data/cocometric-model-backup
            scripts/reposition-cocometric-antennas.py
            scripts/revise-cocometric-shapes.py
            src/data/cocometric-model/part-5-0.js
            src/data/cocometric-model/part-5-1.js
            src/data/cocometric-model/part-5-2.js
            src/data/cocometric-model/part-5-3.js
            src/data/cocometric-model/part-5-4.js
            src/data/cocometric-model/part-5-5.js
            src/data/cocometric-model/shape-revision-manifest.json
            src/scripts/cocometric-stage-polish.js
            src/scripts/cocometric-viewer-v2.js
          )

          failed=0
          for path in "${stale_paths[@]}"; do
            if [ -e "$path" ]; then
              echo "::error file=$path::Stale generated or one-off file must not be tracked."
              failed=1
            fi
          done

          if find . -path '*/.wrangler/*' -not -path './node_modules/*' -print -quit | grep -q .; then
            echo "::error::Generated Wrangler output must not be tracked."
            failed=1
          fi

          exit "$failed"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build production site
        run: npm run build
        env:
          PUBLIC_ANALYTICS_ENABLED: "false"
          PUBLIC_RECRUITER_MATCH_API: ""

      - name: Verify Cocometric output
        run: test -f dist/cocometric/index.html
