name: Validate recruiter assistant

on:
  pull_request:
    branches: [main]
    paths:
      - "src/pages/recruiter/**"
      - "src/data/site.ts"
      - "src/data/capability-map.ts"
      - "public/recruiter-state-bridge.js"
      - "workers/recruiter-match/**"
      - "scripts/validate-recruiter-assistant.mjs"
      - "docs/RECRUITER_ASSISTANT_WORKFLOW.md"
      - "package.json"
      - ".github/workflows/validate-recruiter-assistant.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: recruiter-assistant-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate recruiter workflow contract
        run: npm run validate:recruiter

      - name: Compile Cloudflare Worker
        run: >-
          npx wrangler deploy --dry-run
          --config workers/recruiter-match/wrangler.toml
          --outdir .wrangler/recruiter-dry-run

      - name: Build production site
        run: npm run build
        env:
          PUBLIC_ANALYTICS_ENABLED: "false"
          PUBLIC_RECRUITER_MATCH_API: "https://example.invalid/recruiter-assistant"

      - name: Verify recruiter pages
        run: |
          test -f dist/recruiter/index.html
          test -f dist/recruiter/start/index.html
          grep -q "Analyze role" dist/recruiter/index.html
          grep -q "Portfolio chat" dist/recruiter/index.html
