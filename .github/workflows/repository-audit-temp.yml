name: Temporary repository audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build repository inventory
        run: |
          git ls-files | sort > tracked-files.txt
          {
            echo "=== SCRIPTS ==="
            find scripts -maxdepth 3 -type f -print 2>/dev/null | sort || true
            echo
            echo "=== WORKFLOWS ==="
            find .github/workflows -maxdepth 1 -type f -print | sort
            echo
            echo "=== ROOT HTML / NOTES / BACKUPS ==="
            find . -maxdepth 3 -type f \( -name '*.html' -o -name '*NOTE*' -o -name '*BACKUP*' -o -name '*.bak' -o -name '*.tmp' \) -print | sort
            echo
            echo "=== PACKAGE SCRIPTS ==="
            node -e "console.log(JSON.stringify(require('./package.json').scripts, null, 2))"
          } > repository-audit.txt

          {
            for term in \
              cocometric-viewer-v2 \
              cocometric-stage-polish \
              cocometric-model-backup \
              shape-revision-manifest \
              part-5-0 part-5-1 part-5-2 part-5-3 part-5-4 part-5-5 \
              reposition-cocometric-antennas \
              revise-cocometric-shapes \
              cocometric-before-antenna-axis-fix \
              cocometric-before-rear-antennas \
              cocometric-before-router-cleanup \
              cocometric-before-shorter-antennas \
              cocometric-original-before-shape-revision \
              cocometric-shape-revision.glb \
              recruiter/match; do
              echo "=== $term ==="
              grep -RIn --exclude='repository-audit-temp.yml' --exclude='candidate-references.txt' "$term" . 2>/dev/null || true
              echo
            done
          } > candidate-references.txt

          {
            echo "=== LARGEST TRACKED FILES ==="
            git ls-files -z | xargs -0 du -h | sort -h | tail -80
          } > tracked-file-sizes.txt

      - name: Upload repository inventory
        uses: actions/upload-artifact@v4
        with:
          name: repository-audit
          path: |
            tracked-files.txt
            repository-audit.txt
            candidate-references.txt
            tracked-file-sizes.txt
          if-no-files-found: error
          retention-days: 1
