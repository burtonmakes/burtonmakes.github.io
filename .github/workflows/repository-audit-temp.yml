name: Temporary repository cleanup

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Remove audited stale files
        run: |
          rm -rf \
            public/models \
            src/data/cocometric-model-backup \
            scripts/reposition-cocometric-antennas.py \
            scripts/revise-cocometric-shapes.py \
            src/data/cocometric-model/part-5-0.js \
            src/data/cocometric-model/part-5-1.js \
            src/data/cocometric-model/part-5-2.js \
            src/data/cocometric-model/part-5-3.js \
            src/data/cocometric-model/part-5-4.js \
            src/data/cocometric-model/part-5-5.js \
            src/data/cocometric-model/shape-revision-manifest.json \
            src/scripts/cocometric-stage-polish.js \
            src/scripts/cocometric-viewer-v2.js \
            .github/workflows/repository-audit-temp.yml

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate production build
        run: npm run build
        env:
          PUBLIC_ANALYTICS_ENABLED: "false"
          PUBLIC_RECRUITER_MATCH_API: "https://example.invalid/recruiter-assistant"

      - name: Compile recruiter Worker
        run: >-
          npx wrangler deploy --dry-run
          --config workers/recruiter-match/wrangler.toml
          --outdir .wrangler/recruiter-cleanup-dry-run

      - name: Commit audited cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          if git diff --cached --quiet; then
            echo "Repository is already clean."
            exit 0
          fi
          git commit -m "Remove stale model backups and helper files"
          git push origin HEAD:${GITHUB_HEAD_REF}
