name: Fix Cocometric router hardware

on:
  workflow_dispatch:
  push:
    branches:
      - cocometric-router-antenna-fix
    paths:
      - scripts/reposition-cocometric-antennas.py
      - .github/workflows/fix-cocometric-router.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/reposition-cocometric-antennas.py
      - .github/workflows/fix-cocometric-router.yml

permissions:
  contents: write

concurrency:
  group: fix-cocometric-router-hardware-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: false

jobs:
  generate-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install model tooling
        run: python -m pip install --disable-pip-version-check trimesh

      - name: Rebuild router hardware
        run: python scripts/reposition-cocometric-antennas.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install site dependencies
        run: npm install

      - name: Validate Cocometric model
        run: npm run validate:cocometric

      - name: Build production site
        run: npm run build

      - name: Commit generated model and backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/data/cocometric-model/part-0.js \
            src/data/cocometric-model/part-1.js \
            src/data/cocometric-model/part-2.js \
            src/data/cocometric-model/part-3.js \
            src/data/cocometric-model/part-4.js \
            src/data/cocometric-model/part-5.js \
            src/data/cocometric-model/shape-revision-manifest.json \
            public/models/cocometric-before-router-cleanup.glb \
            public/models/cocometric-shape-revision.glb

          if git diff --cached --quiet; then
            echo "Generated router revision is already current."
            exit 0
          fi

          git commit -m "Fix Cocometric router wall and attach rear antennas"
          git push origin "HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}"
