name: Remove Cocometric step 05 wheel geometry

on:
  push:
    branches:
      - cocometric-remove-step5-wheels
    paths:
      - scripts/remove-cocometric-gpu-fans.mjs
      - .github/workflows/remove-cocometric-step5-wheels.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cocometric-remove-step5-wheels
  cancel-in-progress: false

jobs:
  revise-model:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out shape-revision branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: cocometric-remove-step5-wheels

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Remove wheel-like GPU geometry
        run: node scripts/remove-cocometric-gpu-fans.mjs

      - name: Validate GLB structure and component names
        run: npm run validate:cocometric

      - name: Validate production build
        run: npm run build

      - name: Commit revised GLB and backups
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/data/cocometric-model/part-0.js \
            src/data/cocometric-model/part-1.js \
            src/data/cocometric-model/part-2.js \
            src/data/cocometric-model/part-3.js \
            src/data/cocometric-model/part-4.js \
            src/data/cocometric-model/part-5.js \
            src/data/cocometric-model/manifest.json \
            src/data/cocometric-model/shape-revision-step5.json \
            src/data/cocometric-model-backup/modern-pre-step5-wheel-removal \
            public/models/cocometric-modern.glb \
            public/models/cocometric-modern-pre-step5-wheel-removal.glb

          if git diff --cached --quiet; then
            echo "The step 05 shape revision is already current."
            exit 0
          fi

          git commit -m "Remove wheel-like geometry from Cocometric step 05"
          git push origin HEAD:cocometric-remove-step5-wheels
