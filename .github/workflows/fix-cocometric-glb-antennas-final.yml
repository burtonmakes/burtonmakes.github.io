name: Fix Cocometric GLB antennas

on:
  workflow_dispatch:
  push:
    branches:
      - fix-cocometric-glb-antennas-final
    paths:
      - scripts/reposition-cocometric-antennas.py
      - .github/workflows/fix-cocometric-glb-antennas-final.yml

permissions:
  contents: write

concurrency:
  group: fix-cocometric-glb-antennas-final
  cancel-in-progress: false

jobs:
  generate-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: fix-cocometric-glb-antennas-final

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install model tooling
        run: python -m pip install --disable-pip-version-check trimesh

      - name: Correct antenna geometry
        id: correct
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/reposition-cocometric-antennas.py 2>&1 | tee cocometric-antenna-fix.log

      - name: Set up Node.js
        if: steps.correct.outcome == 'success'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install site dependencies
        if: steps.correct.outcome == 'success'
        run: npm install

      - name: Validate Cocometric model
        if: steps.correct.outcome == 'success'
        run: npm run validate:cocometric

      - name: Build production site
        if: steps.correct.outcome == 'success'
        run: npm run build

      - name: Commit generated GLB or failure diagnostics
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          touch cocometric-antenna-fix.log
          git add cocometric-antenna-fix.log
          for path in \
            src/data/cocometric-model/part-0.js \
            src/data/cocometric-model/part-1.js \
            src/data/cocometric-model/part-2.js \
            src/data/cocometric-model/part-3.js \
            src/data/cocometric-model/part-4.js \
            src/data/cocometric-model/part-5.js \
            src/data/cocometric-model/shape-revision-manifest.json \
            public/models/cocometric-before-antenna-axis-fix.glb \
            public/models/cocometric-shape-revision.glb; do
            if [ -e "$path" ]; then git add "$path"; fi
          done

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Generate corrected Cocometric antenna GLB"
          git push origin HEAD:fix-cocometric-glb-antennas-final

      - name: Fail if geometry correction failed
        if: steps.correct.outcome == 'failure'
        run: exit 1
