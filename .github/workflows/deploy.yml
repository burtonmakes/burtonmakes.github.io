name: Deploy archived public site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public Burton Makes archive
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Pages
        id: pages_setup
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Install and build static archive
        id: archive_build
        shell: bash
        run: |
          set +e
          (
            echo "Commit: $GITHUB_SHA"
            echo "Node: $(node --version)"
            echo "npm: $(npm --version)"
            npm install --no-audit --no-fund && npm exec astro build
          ) 2>&1 | tee CI_DIAGNOSTIC.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Pages artifact
        id: artifact_upload
        if: steps.archive_build.outputs.exit_code == '0' && steps.pages_setup.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.archive_build.outputs.exit_code == '0' && steps.pages_setup.outcome == 'success' && steps.artifact_upload.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Record failed action diagnostic
        if: steps.archive_build.outputs.exit_code != '0' || steps.pages_setup.outcome != 'success' || steps.artifact_upload.outcome != 'success' || steps.deployment.outcome != 'success'
        shell: bash
        env:
          BUILD_EXIT: ${{ steps.archive_build.outputs.exit_code }}
          SETUP_OUTCOME: ${{ steps.pages_setup.outcome }}
          UPLOAD_OUTCOME: ${{ steps.artifact_upload.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
        run: |
          {
            echo "Commit: $GITHUB_SHA"
            echo "build_exit=$BUILD_EXIT"
            echo "pages_setup=$SETUP_OUTCOME"
            echo "artifact_upload=$UPLOAD_OUTCOME"
            echo "pages_deploy=$DEPLOY_OUTCOME"
          } > CI_ACTION_STATUS.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CI_DIAGNOSTIC.txt CI_ACTION_STATUS.txt
          git commit -m "Record archive action diagnostic [skip ci]"
          git push

      - name: Fail unsuccessful deployment
        if: steps.archive_build.outputs.exit_code != '0' || steps.pages_setup.outcome != 'success' || steps.artifact_upload.outcome != 'success' || steps.deployment.outcome != 'success'
        run: exit 1
