name: Deploy archived public site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public Burton Makes archive
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install and build static archive
        id: archive_build
        shell: bash
        run: |
          set +e
          (
            echo "Commit: $GITHUB_SHA"
            echo "Node: $(node --version)"
            echo "npm: $(npm --version)"
            npm install --no-audit --no-fund && npm exec astro build
          ) 2>&1 | tee CI_DIAGNOSTIC.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record failed build diagnostic
        if: steps.archive_build.outputs.exit_code != '0'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CI_DIAGNOSTIC.txt
          git commit -m "Record archive build diagnostic [skip ci]"
          git push

      - name: Stop after failed build
        if: steps.archive_build.outputs.exit_code != '0'
        run: exit "${{ steps.archive_build.outputs.exit_code }}"

      - name: Upload artifact
        if: steps.archive_build.outputs.exit_code == '0'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
